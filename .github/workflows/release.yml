name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build web assets
        run: |
          cd web && npm install && npm run build

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu cmake build-essential

      - name: Install libplctag (amd64)
        run: |
          git clone --depth 1 https://github.com/libplctag/libplctag.git /tmp/libplctag
          cd /tmp/libplctag && mkdir build && cd build
          cmake .. && make -j$(nproc) && sudo make install
          sudo cp bin_dist/libplctag_static.a /usr/local/lib/
          sudo ldconfig

      - name: Install libplctag (arm64 cross-compile)
        run: |
          cd /tmp/libplctag && mkdir build-arm64 && cd build-arm64
          cmake .. \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_INSTALL_PREFIX=/usr/aarch64-linux-gnu
          make -j$(nproc) || true
          sudo mkdir -p /usr/aarch64-linux-gnu/lib /usr/aarch64-linux-gnu/include
          sudo cp -f bin_dist/libplctag.so* /usr/aarch64-linux-gnu/lib/
          sudo cp -f bin_dist/libplctag_static.a /usr/aarch64-linux-gnu/lib/
          sudo find /tmp/libplctag/src -name 'libplctag.h' -exec cp {} /usr/aarch64-linux-gnu/include/ \;

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CGO_LDFLAGS_ALLOW: ".*"
          C_INCLUDE_PATH: /usr/local/include
          LIBRARY_PATH: /usr/local/lib

      - name: Publish to DigitalOcean Spaces + Directus
        run: |
          sudo apt-get install -y -qq s3cmd jq
          ./scripts/release-infra/publish-release.sh
        env:
          DO_SPACES_KEY: ${{ secrets.DO_SPACES_KEY }}
          DO_SPACES_SECRET: ${{ secrets.DO_SPACES_SECRET }}
          DO_SPACES_BUCKET: ${{ secrets.DO_SPACES_BUCKET }}
          DO_SPACES_REGION: ${{ secrets.DO_SPACES_REGION }}
          DIRECTUS_URL: ${{ secrets.DIRECTUS_URL }}
          DIRECTUS_TOKEN: ${{ secrets.DIRECTUS_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
