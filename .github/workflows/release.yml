name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Build inside debian:bullseye (glibc 2.31) so binaries run on Bullseye and newer.
    # ubuntu-latest's glibc is too new for older Debian targets like CompuLab IOT-GATE-iMX8.
    container: debian:bullseye
    steps:
      - name: Install base tooling
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git xz-utils gnupg \
            cmake build-essential \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            jq s3cmd
          # gh CLI is not in Bullseye repos; install from the official GitHub apt source
          mkdir -p -m 755 /etc/apt/keyrings
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
            | tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null
          chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
            > /etc/apt/sources.list.d/github-cli.list
          apt-get update
          apt-get install -y --no-install-recommends gh

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark workspace safe for git
        # actions/checkout inside a container leaves the workspace owned by a UID
        # git doesn't trust, so goreleaser/git operations fail with "dubious ownership".
        run: git config --global --add safe.directory '*'

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build web assets
        run: |
          cd web && npm install && npm run build

      - name: Install libplctag (amd64)
        run: |
          git clone --depth 1 https://github.com/libplctag/libplctag.git /tmp/libplctag
          cd /tmp/libplctag && mkdir build && cd build
          cmake .. && make -j$(nproc) && make install
          cp bin_dist/libplctag_static.a /usr/local/lib/
          ldconfig

      - name: Install libplctag (arm64 cross-compile)
        run: |
          cd /tmp/libplctag && mkdir build-arm64 && cd build-arm64
          cmake .. \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_INSTALL_PREFIX=/usr/aarch64-linux-gnu
          make -j$(nproc) || true
          mkdir -p /usr/aarch64-linux-gnu/lib /usr/aarch64-linux-gnu/include
          cp -f bin_dist/libplctag.so* /usr/aarch64-linux-gnu/lib/
          cp -f bin_dist/libplctag_static.a /usr/aarch64-linux-gnu/lib/
          find /tmp/libplctag/src -name 'libplctag.h' -exec cp {} /usr/aarch64-linux-gnu/include/ \;

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CGO_LDFLAGS_ALLOW: ".*"
          C_INCLUDE_PATH: /usr/local/include
          LIBRARY_PATH: /usr/local/lib

      - name: Publish to DigitalOcean Spaces + Directus
        # Non-fatal: GitHub Releases is still authoritative if this step fails
        # (e.g. Spaces/Directus outage). Surfaces as a workflow warning.
        continue-on-error: true
        run: |
          ./scripts/release-infra/publish-release.sh
        env:
          DO_SPACES_KEY: ${{ secrets.DO_SPACES_KEY }}
          DO_SPACES_SECRET: ${{ secrets.DO_SPACES_SECRET }}
          DO_SPACES_BUCKET: ${{ secrets.DO_SPACES_BUCKET }}
          DO_SPACES_REGION: ${{ secrets.DO_SPACES_REGION }}
          DIRECTUS_URL: ${{ secrets.DIRECTUS_URL }}
          DIRECTUS_TOKEN: ${{ secrets.DIRECTUS_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
