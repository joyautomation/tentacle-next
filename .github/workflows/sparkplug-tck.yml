name: Sparkplug TCK

on:
  push:
    branches: [main, "feature/mantle"]
    tags: ["v*"]
  pull_request:
    branches: [main, "feature/mantle"]
  workflow_dispatch:

env:
  TCK_REF: master  # pin to a tag/SHA once Eclipse Sparkplug starts cutting them
  HIVEMQ_IMAGE: hivemq/hivemq-ce:latest

jobs:
  # Skip the heavy TCK jobs unless something Sparkplug-relevant changed.
  # Tag pushes (releases) and manual dispatches always run as a CYA. Path
  # filters at the `on:` level don't interact predictably with tag pushes
  # (no well-defined diff base), so we gate at the job level instead.
  decide:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]] || [[ "$REF" == refs/tags/v* ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "tag/dispatch — running TCK"
            exit 0
          fi
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base="$PR_BASE"; head="$PR_HEAD"
          else
            base="$PUSH_BEFORE"; head="$PUSH_AFTER"
          fi
          # On a brand-new branch the "before" sha is all zeros — bail out
          # safe and run the TCK.
          if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "no diff base — running TCK"
            exit 0
          fi
          patterns='^(internal/mqtt/|internal/sparkplug/|internal/sparkplughost/|cmd/tentacle-sparkplug/|cmd/tentacle-sparkplug-host/|cmd/tck-fixture/|scripts/tck/|\.github/workflows/sparkplug-tck\.yml|go\.mod|go\.sum)'
          if git diff --name-only "$base" "$head" | grep -qE "$patterns"; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Sparkplug-relevant changes detected — running TCK"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "no Sparkplug-relevant changes — skipping TCK"
          fi

  build-tck-extension:
    needs: decide
    if: needs.decide.outputs.run == 'true'
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cachekey.outputs.key }}
    steps:
      - uses: actions/checkout@v4

      - id: cachekey
        run: echo "key=tck-ext-${{ env.TCK_REF }}-$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        id: cache
        with:
          path: tck-ext
          key: ${{ steps.cachekey.outputs.key }}

      # The TCK pins its java toolchain to 11 (see eclipse-sparkplug/sparkplug
       # tck/build.gradle.kts), and the spec subproject's asciidoctor 3.3.2
       # plugin breaks on Gradle 9 — pin both.
      - uses: actions/setup-java@v4
        if: steps.cache.outputs.cache-hit != 'true'
        with:
          distribution: temurin
          java-version: 11

      - uses: gradle/actions/setup-gradle@v3
        if: steps.cache.outputs.cache-hit != 'true'
        with:
          gradle-version: "8.10"

      - name: Build TCK extension
        if: steps.cache.outputs.cache-hit != 'true'
        run: TCK_REF="${TCK_REF}" scripts/tck/build-tck-extension.sh "$PWD/tck-ext"

      - uses: actions/upload-artifact@v4
        with:
          name: tck-extension
          path: tck-ext
          retention-days: 7

  edge-node:
    needs: build-tck-extension
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install paho-mqtt pyyaml

      - uses: actions/download-artifact@v4
        with:
          name: tck-extension
          path: tck-ext

      - name: Start HiveMQ + TCK extension
        run: |
          mkdir -p hivemq-data hivemq-log
          docker run -d --name hivemq \
            -p 1883:1883 -p 8080:8080 \
            -v "$PWD/tck-ext/sparkplug-tck:/opt/hivemq/extensions/sparkplug-tck:ro" \
            ${{ env.HIVEMQ_IMAGE }}
          # wait for broker to accept connections
          for i in $(seq 1 60); do
            if (echo > /dev/tcp/127.0.0.1/1883) >/dev/null 2>&1; then break; fi
            sleep 1
          done
          docker ps

      - name: Start NATS
        run: |
          docker run -d --name nats -p 4222:4222 nats:2 -js
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/127.0.0.1/4222) >/dev/null 2>&1; then break; fi
            sleep 1
          done

      - name: Build sparkplug node
        run: go build -tags mqtt -o ./tentacle-sparkplug ./cmd/tentacle-sparkplug

      - name: Build TCK fixture
        # Publishes synthetic gateway data on NATS so the bridge has a device +
        # variables to publish DBIRTH/DDATA for. Without it, the TCK reports
        # ~20 device-related assertions as NOT EXECUTED.
        run: go build -o ./tck-fixture ./cmd/tck-fixture

      - name: Run TCK (edge profile)
        env:
          # Driver config
          TCK_HOST_ID: MantleHost
          TCK_GROUP_ID: TentacleGroup
          TCK_EDGE_NODE_ID: EdgeNode1
          TCK_DEVICE_ID: Device1
          TCK_CLIENT_ID: tentacle-mqtt
          MQTT_BROKER_URL: tcp://localhost:1883
          # Impl-under-test config (forwarded to the subprocess the driver spawns).
          # The driver starts the node fresh after NEW_TEST so the TCK observes
          # its full connect/NBIRTH sequence.
          NATS_URL: nats://localhost:4222
          MODULE_ID: mqtt
          MQTT_CLIENT_ID: tentacle-mqtt
          MQTT_GROUP_ID: TentacleGroup
          MQTT_EDGE_NODE: EdgeNode1
          MQTT_USE_TEMPLATES: "true"
          MQTT_PRIMARY_HOST_ID: MantleHost
          # Persist bdSeq across the impl process restarts the driver does
          # between tests — otherwise the TCK Monitor (which spans all tests)
          # sees bdSeq reset to 0 and fails the increment-by-one assertions.
          MQTT_BDSEQ_FILE: "${{ github.workspace }}/bdseq.state"
        run: |
          python scripts/tck/run_tck.py \
            --profile edge \
            --report tck-edge.json \
            --impl-cmd "$PWD/tentacle-sparkplug" \
            --impl-log sparkplug-node.log \
            --fixture-cmd "$PWD/tck-fixture --device $TCK_DEVICE_ID" \
            --fixture-log fixture.log

      - name: Collect logs
        if: always()
        run: |
          docker logs hivemq > hivemq.log 2>&1 || true
          docker logs nats > nats.log 2>&1 || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tck-edge-artifacts
          path: |
            tck-edge.json
            sparkplug-node.log
            fixture.log
            hivemq.log
            nats.log

  host-application:
    needs: build-tck-extension
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # The host module only exists on feature/mantle (and main once mantle merges).
    # Skip the job on branches that don't ship it.
    steps:
      - uses: actions/checkout@v4

      - name: Detect host binary
        id: detect
        run: |
          if [ -f cmd/tentacle-sparkplug-host/main.go ]; then
            echo "present=1" >> "$GITHUB_OUTPUT"
          else
            echo "present=0" >> "$GITHUB_OUTPUT"
            echo "host module not present on this ref — skipping"
          fi

      - if: steps.detect.outputs.present == '1'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - if: steps.detect.outputs.present == '1'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - if: steps.detect.outputs.present == '1'
        run: pip install paho-mqtt pyyaml

      - if: steps.detect.outputs.present == '1'
        uses: actions/download-artifact@v4
        with:
          name: tck-extension
          path: tck-ext

      - if: steps.detect.outputs.present == '1'
        name: Start HiveMQ + TCK extension
        run: |
          docker run -d --name hivemq \
            -p 1883:1883 -p 8080:8080 \
            -v "$PWD/tck-ext/sparkplug-tck:/opt/hivemq/extensions/sparkplug-tck:ro" \
            ${{ env.HIVEMQ_IMAGE }}
          for i in $(seq 1 60); do
            if (echo > /dev/tcp/127.0.0.1/1883) >/dev/null 2>&1; then break; fi
            sleep 1
          done

      - if: steps.detect.outputs.present == '1'
        name: Start NATS
        run: |
          docker run -d --name nats -p 4222:4222 nats:2 -js
          for i in $(seq 1 30); do
            if (echo > /dev/tcp/127.0.0.1/4222) >/dev/null 2>&1; then break; fi
            sleep 1
          done

      - if: steps.detect.outputs.present == '1'
        name: Build sparkplug host + partner edge + fixture
        run: |
          go build -tags sparkplughost -o ./tentacle-sparkplug-host ./cmd/tentacle-sparkplug-host
          go build -tags mqtt -o ./tentacle-sparkplug ./cmd/tentacle-sparkplug
          go build -o ./tck-fixture ./cmd/tck-fixture

      - if: steps.detect.outputs.present == '1'
        name: Run TCK (host profile)
        env:
          TCK_HOST_ID: MantleHost
          MQTT_BROKER_URL: tcp://localhost:1883
          # Impl-under-test config
          NATS_URL: nats://localhost:4222
          MODULE_ID: sparkplug-host
          SPARKPLUG_HOST_BROKER_URL: tcp://localhost:1883
          SPARKPLUG_HOST_PRIMARY_HOST_ID: MantleHost
          SPARKPLUG_HOST_GROUP: "+"
          # Partner edge node config (consumed by tentacle-sparkplug).
          MQTT_PRIMARY_HOST_ID: MantleHost
          MQTT_BDSEQ_FILE: /tmp/bdseq.state
        run: |
          python scripts/tck/run_tck.py \
            --profile host \
            --report tck-host.json \
            --impl-cmd "$PWD/tentacle-sparkplug-host" \
            --impl-log sparkplug-host.log \
            --partner-cmd "$PWD/tentacle-sparkplug" \
            --partner-log sparkplug-partner.log \
            --fixture-cmd "$PWD/tck-fixture --device Device1" \
            --fixture-log tck-fixture.log

      - if: always() && steps.detect.outputs.present == '1'
        name: Collect logs
        run: |
          docker logs hivemq > hivemq.log 2>&1 || true
          docker logs nats > nats.log 2>&1 || true

      - if: always() && steps.detect.outputs.present == '1'
        uses: actions/upload-artifact@v4
        with:
          name: tck-host-artifacts
          path: |
            tck-host.json
            sparkplug-host.log
            sparkplug-partner.log
            tck-fixture.log
            hivemq.log
            nats.log
