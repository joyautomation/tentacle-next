version: 2

project_name: tentacle

builds:
  - id: tentacle
    dir: cmd/tentacle
    binary: tentacle
    tags:
      - all
      - web
    env:
      - CGO_ENABLED=1
      - >-
        {{- if eq .Arch "arm64" }}CC=aarch64-linux-gnu-gcc{{- end }}
      - >-
        {{- if eq .Arch "arm64" }}CGO_CFLAGS=-I/usr/aarch64-linux-gnu/include{{- end }}
      - >-
        {{- if eq .Arch "arm64" }}CGO_LDFLAGS=-L/usr/aarch64-linux-gnu/lib{{- end }}
    goos:
      - linux
    goarch:
      - amd64
      - arm64

  - id: tentacle-core
    dir: cmd/tentacle-core
    binary: tentacle-core
    tags:
      - gateway
      - api
      - web
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

  - id: tentacle-ethernetip
    dir: cmd/tentacle-ethernetip
    binary: tentacle-ethernetip
    tags:
      - ethernetip
    env:
      - CGO_ENABLED=1
      - >-
        {{- if eq .Arch "arm64" }}CC=aarch64-linux-gnu-gcc{{- end }}
      - >-
        {{- if eq .Arch "arm64" }}CGO_CFLAGS=-I/usr/aarch64-linux-gnu/include{{- end }}
      - >-
        {{- if eq .Arch "arm64" }}CGO_LDFLAGS=-L/usr/aarch64-linux-gnu/lib{{- end }}
    goos:
      - linux
    goarch:
      - amd64
      - arm64

  - id: tentacle-opcua
    dir: cmd/tentacle-opcua
    binary: tentacle-opcua
    tags:
      - opcua
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

  - id: tentacle-snmp
    dir: cmd/tentacle-snmp
    binary: tentacle-snmp
